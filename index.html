<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Genie Drawing Game</title>
    <style>
        /* Force Fullscreen Layout */
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif;
            background-color: #000;
        }
        
        /* Responsive Background Video */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; /* Ensures no black bars */
        }

        #game-container { 
            display: flex; width: 100%; height: 100%; 
            align-items: center; justify-content: space-between;
            padding: 20px 40px; box-sizing: border-box;
        }

        /* --- WHITEBOARD --- */
        #whiteboard-container { 
            width: 50%; height: 60%; background: white; 
            border: 15px solid #5D4037; border-radius: 20px; 
            position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            margin-top: 40px;
        }
        #canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; display: block; }
        
        #prompt-box {
            position: absolute; top: -110px; left: 50%; transform: translateX(-50%);
            background: #FFF9C4; border: 6px solid #FBC02D;
            padding: 10px 30px; border-radius: 50px; min-width: 280px;
            text-align: center; box-shadow: 0 6px 0px #F9A825;
            display: none; opacity: 0; transition: opacity 0.5s;
        }
        #instruction { font-size: 2.5rem; margin: 0; color: #333; white-space: nowrap; }

        #big-reveal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 8rem; color: #FFEB3B; text-shadow: 0 0 30px #000, 5px 5px 0px #E65100;
            z-index: 2000; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; text-align: center;
        }

        #timer-display { 
            position: absolute; top: 10px; right: 20px; 
            font-size: 4rem; color: #D32F2F; font-weight: bold; 
        }

        /* --- GENIE & LAMP --- */
        #genie-side { 
            width: 45%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .genie-box { position: relative; width: 100%; height: 450px; text-align: center; }
        #genie-img { width: 100%; max-width: 500px; position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); z-index: 1; }
        #lamp-img { width: 80%; max-width: 380px; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; }

        .shake { animation: shake 0.4s infinite; }
        @keyframes shake {
            0% { transform: translate(3px, 3px) rotate(0deg) translateX(-50%); }
            25% { transform: translate(-6px, 0px) rotate(-4deg) translateX(-50%); }
            50% { transform: translate(6px, 3px) rotate(4deg) translateX(-50%); }
            100% { transform: translate(3px, -3px) rotate(-2deg) translateX(-50%); }
        }

        /* --- BUTTONS --- */
        #controls { position: absolute; bottom: -85px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 15px 25px; font-size: 1.3rem; border-radius: 15px; border: 3px solid white; cursor: pointer; color: white; font-weight: bold; }
        .color-black { background: black; }
        .color-blue { background: #2979FF; }
        .color-green { background: #00E676; }
        .eraser { background: #757575; }
        
        #start-btn { 
            margin-top: 20px; padding: 25px 80px; font-size: 3rem; 
            background: #FF6D00; color: white; border: 6px solid white; 
            border-radius: 60px; cursor: pointer;
        }

        #ok-btn { background: #AA00FF; display: none; border: 4px solid #FFD600; }
        .flicker { animation: flicker 0.4s infinite; }
        @keyframes flicker { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* OVERLAYS */
        #fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #reward-video { width: 100%; height: 80%; object-fit: contain; }
    </style>
</head>
<body>

    <div id="fullscreen-overlay">
        <h1 style="color:white; margin-bottom:20px;">Genie Drawing Challenge</h1>
        <button id="start-btn" onclick="activateGame()">PLAY FULLSCREEN</button>
    </div>

    <video autoplay muted loop id="bg-video"><source src="background.mp4" type="video/mp4"></video>

    <div id="big-reveal"></div>

    <div id="video-overlay">
        <video id="reward-video" playsinline><source src="goodjob.mp4" type="video/mp4"></video>
        <button class="btn" style="margin-top:20px; background: #FF6D00; width: 300px; font-size: 2rem;" onclick="resetGame()">PLAY AGAIN</button>
    </div>

    <div id="game-container">
        <div id="whiteboard-container">
            <div id="prompt-box"><p id="instruction"></p></div>
            <div id="timer-display"></div>
            <canvas id="canvas"></canvas>
            <div id="controls">
                <button class="btn color-black" onclick="setColor('black')">Black</button>
                <button class="btn color-blue" onclick="setColor('blue')">Blue</button>
                <button class="btn color-green" onclick="setColor('green')">Green</button>
                <button class="btn eraser" onclick="setColor('white')">Eraser</button>
                <button id="ok-btn" class="btn flicker" onclick="showReward()">OKAY!</button>
            </div>
        </div>

        <div id="genie-side">
            <div class="genie-box">
                <img src="genie.gif" id="genie-img">
                <img src="lamp.gif" id="lamp-img">
            </div>
            <button id="start-btn-real" class="btn" style="background:#FF6D00; padding:20px 60px; font-size:2.5rem; border-radius:50px;" onclick="startGame()">START</button>
        </div>
    </div>

    <audio id="snd-tick" src="tick.mp3"></audio>
    <audio id="snd-timesup" src="timesup.mp3"></audio>
    <audio id="snd-shimmer" src="shimmer.mp3"></audio>
    <audio id="snd-reveal" src="reveal.mp3"></audio>

    <script>
        const words = [
            { t: "Draw a Flower", e: "🌸" }, { t: "Draw a Heart", e: "❤️" },
            { t: "Draw a Star", e: "⭐" }, { t: "Draw a Smile", e: "😊" },
            { t: "Draw a Sad Face", e: "😢" }
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Fullscreen for iPad
        function activateGame() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // iOS/Safari
            
            document.getElementById('fullscreen-overlay').style.display = 'none';
            initCanvas();
        }

        function initCanvas() {
            // High-res fix for iPad
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'black';
        }

        function startGame() {
            document.getElementById('start-btn-real').style.visibility = "hidden";
            document.getElementById('snd-shimmer').play();
            document.getElementById('lamp-img').classList.add('shake');
            document.getElementById('genie-img').src = "genie.gif?t=" + new Date().getTime();

            setTimeout(() => {
                document.getElementById('lamp-img').classList.remove('shake');
                const selected = words[Math.floor(Math.random() * words.length)];
                
                document.getElementById('snd-reveal').play();
                const br = document.getElementById('big-reveal');
                br.innerHTML = `${selected.t}<br>${selected.e}`;
                br.style.transform = "translate(-50%, -50%) scale(1)";
                
                setTimeout(() => {
                    br.style.transform = "translate(-50%, -50%) scale(0)";
                    document.getElementById('instruction').innerHTML = `${selected.t} ${selected.e}`;
                    const pb = document.getElementById('prompt-box');
                    pb.style.display = 'block'; pb.style.opacity = '1';
                    startTimer();
                }, 1800);
            }, 2000);
        }

        function startTimer() {
            let timeLeft = 10;
            document.getElementById('timer-display').innerText = timeLeft;
            const timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft <= 8 && timeLeft > 0) {
                    const t = document.getElementById('snd-tick');
                    t.currentTime = 0; t.play();
                }
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('snd-tick').pause();
                    document.getElementById('snd-timesup').play();
                    document.getElementById('ok-btn').style.display = 'block';
                }
            }, 1000);
        }

        // --- DRAW LOGIC ---
        let painting = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function draw(e) {
            if (!painting) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        }
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); painting = true; draw(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        canvas.addEventListener('touchend', () => { painting = false; ctx.beginPath(); });

        function setColor(c) { 
            ctx.strokeStyle = c; 
            ctx.lineWidth = (c === 'white') ? 60 : 10; 
        }

        function showReward() {
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('reward-video').play();
        }

        function resetGame() { location.reload(); }
    </script>
</body>
</html>
